<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Myth-Eye-Cal Viewer</title>
<style>
  html, body { margin: 0; height: 100%; background: #0a0c10; overflow: hidden;
    font: 13px/1.5 ui-monospace, Menlo, Consolas, monospace; color: #cdd6e0; }
  #stats { position: fixed; top: 10px; left: 12px; white-space: pre;
    text-shadow: 0 1px 2px #000; pointer-events: none; }
  #stats b { color: #7fd5a0; }
  #bar { position: fixed; top: 10px; right: 12px; }
  #bar input { width: 230px; background: #161a22; color: #cdd6e0;
    border: 1px solid #2a3140; border-radius: 4px; padding: 5px 7px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 5px; vertical-align: middle; }
</style>
</head>
<body>
<div id="stats"></div>
<div id="bar"><input id="url" value="ws://localhost:8080/pose" title="WebSocket pose endpoint" /></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// 17-keypoint skeleton edges (§6.2), indices match kMediapipe33To17 order.
const BONES = [
  [0,1],[0,2],[1,3],[2,4],            // face
  [5,6],                              // shoulders
  [5,7],[7,9],[6,8],[8,10],           // arms
  [5,11],[6,12],[11,12],              // torso + hips
  [11,13],[13,15],[12,14],[14,16],    // legs
];
const N_KP = 17;

// --- scene ---------------------------------------------------------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0c10);
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 200);
camera.position.set(2.2, 1.4, 3.0);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 1.0, 0);

scene.add(new THREE.GridHelper(8, 16, 0x223044, 0x141a24));
scene.add(new THREE.HemisphereLight(0xbfd4ff, 0x202830, 1.0));
const key = new THREE.DirectionalLight(0xffffff, 1.6);
key.position.set(3, 6, 4);
scene.add(key);

// confidence -> colour: red (low/predicted) -> yellow -> green (high).
const tmpColor = new THREE.Color();
function confColour(c) { tmpColor.setHSL(Math.max(0, Math.min(1, c)) * 0.33, 0.85, 0.55); return tmpColor; }

const rig = new THREE.Group();
scene.add(rig);

const jointGeo = new THREE.SphereGeometry(0.05, 18, 14);
const joints = [];
for (let i = 0; i < N_KP; i++) {
  const m = new THREE.Mesh(jointGeo, new THREE.MeshStandardMaterial({ roughness: 0.45, metalness: 0.1 }));
  rig.add(m); joints.push(m);
}
// Bones as oriented cylinders (unit height, scaled per frame).
const boneGeo = new THREE.CylinderGeometry(0.022, 0.022, 1, 14);
const bones = BONES.map(() => {
  const m = new THREE.Mesh(boneGeo, new THREE.MeshStandardMaterial({ roughness: 0.5, metalness: 0.1 }));
  rig.add(m); return m;
});

// world (wx,wy,wz) [x right, y forward, z up] -> three (x, z_up, y)
const P = (k) => new THREE.Vector3(k.wx, k.wz, k.wy);
const UP = new THREE.Vector3(0, 1, 0);

// Smoothed joint positions (reduce jitter); confidences for colouring.
const sm = Array.from({ length: N_KP }, () => new THREE.Vector3());
const conf = new Float32Array(N_KP);
let primed = false;

function orient(mesh, a, b) {
  const dir = new THREE.Vector3().subVectors(b, a);
  const len = dir.length();
  if (len < 1e-5) { mesh.visible = false; return; }
  mesh.visible = true;
  mesh.position.copy(a).addScaledVector(dir, 0.5);
  mesh.quaternion.setFromUnitVectors(UP, dir.normalize());
  mesh.scale.set(1, len, 1);
}

const centroid = new THREE.Vector3(0, 1, 0);
function applyPose(kps) {
  const t = primed ? 0.35 : 1.0;          // lerp factor (snap on first frame)
  const c = new THREE.Vector3();
  for (let i = 0; i < N_KP; i++) {
    sm[i].lerp(P(kps[i]), t);
    conf[i] = kps[i].conf;
    joints[i].position.copy(sm[i]);
    joints[i].material.color.copy(confColour(conf[i]));
    c.add(sm[i]);
  }
  primed = true;
  c.multiplyScalar(1 / N_KP);
  centroid.lerp(c, 0.1);                   // smooth camera target
  controls.target.lerp(centroid, 0.1);
  BONES.forEach((e, bi) => {
    orient(bones[bi], sm[e[0]], sm[e[1]]);
    bones[bi].material.color.copy(confColour(Math.min(conf[e[0]], conf[e[1]])));
  });
}

// --- WebSocket ingest ----------------------------------------------------
let ws = null, latest = null, observerCount = 0, latencyMs = 0, source = 'demo';
function connect(url) {
  if (ws) { ws.onclose = null; ws.close(); }
  source = 'connecting';
  try { ws = new WebSocket(url); } catch { source = 'demo'; return; }
  ws.onopen = () => { source = 'live'; };
  ws.onclose = () => { source = 'demo'; };
  ws.onerror = () => { source = 'demo'; };
  ws.onmessage = (ev) => {
    try {
      const f = JSON.parse(ev.data);
      if (f.type !== 'pose_frame') return;
      latest = f.keypoints; observerCount = f.observer_count || 0;
      latencyMs = Math.max(0, (Date.now()/1000 - f.timestamp_s) * 1000) | 0;
    } catch {}
  };
}
const urlInput = document.getElementById('url');
urlInput.addEventListener('change', () => connect(urlInput.value));
connect(urlInput.value);

// --- demo fallback: a gently moving skeleton so the page is never blank ---
const DEMO = [
 [0,0,1.70],[0.03,0,1.73],[-0.03,0,1.73],[0.07,0,1.72],[-0.07,0,1.72],
 [0.18,0,1.45],[-0.18,0,1.45],[0.20,0,1.15],[-0.20,0,1.15],[0.22,0,0.90],
 [-0.22,0,0.90],[0.12,0,0.95],[-0.12,0,0.95],[0.13,0,0.52],[-0.13,0,0.52],
 [0.13,0,0.05],[-0.13,0,0.05]];
function demoPose(t) {
  const sw = Math.sin(t * 1.5) * 0.12, bob = 0.02 * Math.sin(t * 3);
  return DEMO.map((p, i) => {
    let wx = p[0], wz = p[2] + bob;
    if (i === 9)  { wx += sw; }            // left wrist swing
    if (i === 10) { wx -= sw; }            // right wrist swing
    if (i === 7)  { wx += sw * 0.5; }
    if (i === 8)  { wx -= sw * 0.5; }
    return { id: i, wx, wy: 0, wz, conf: 0.6 + 0.35 * Math.abs(Math.sin(t + i)) };
  });
}

// --- loop ----------------------------------------------------------------
const stats = document.getElementById('stats');
const clock = new THREE.Clock();
function tick() {
  requestAnimationFrame(tick);
  const t = clock.getElapsedTime();
  applyPose((source === 'live' && latest) ? latest : demoPose(t));
  controls.update();
  renderer.render(scene, camera);
  const mc = (sm.length ? conf.reduce((s, x) => s + x, 0) / N_KP : 0);
  const col = source === 'live' ? '#7fd5a0' : '#d6a14a';
  stats.innerHTML =
    `<b>Myth-Eye-Cal</b>\n` +
    `<span class="dot" style="background:${col}"></span>source: ${source}\n` +
    `observers: ${source === 'live' ? observerCount : '—'}\n` +
    `latency:   ${source === 'live' ? latencyMs + 'ms' : '—'}\n` +
    `mean conf: ${mc.toFixed(2)}`;
}
tick();
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
